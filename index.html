const ProductRow = ({row,idx,onChange,onDelete,hsnList,gstType})=>{
  const [showDrop,setShowDrop]=useState(false);
  const [hsnQ,setHsnQ]=useState(row.hsnCode||'');
  const [dropPos,setDropPos]=useState({top:0,left:0,width:0});
  const inputRef=useRef();
  const dropRef=useRef();

  // Close on outside click
  useEffect(()=>{
    const h=e=>{
      if(inputRef.current&&!inputRef.current.contains(e.target)&&
         dropRef.current&&!dropRef.current.contains(e.target))
        setShowDrop(false);
    };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);

  // Recalculate position every time dropdown opens or on scroll/resize
  const updatePos=()=>{
    if(inputRef.current){
      const r=inputRef.current.getBoundingClientRect();
      // Use fixed positioning — coordinates are always relative to viewport, no scroll offset needed
      setDropPos({top:r.bottom+4, left:r.left, width:Math.max(r.width,380)});
    }
  };

  useEffect(()=>{
    if(showDrop){
      updatePos();
      window.addEventListener('scroll',updatePos,true);
      window.addEventListener('resize',updatePos);
      return()=>{
        window.removeEventListener('scroll',updatePos,true);
        window.removeEventListener('resize',updatePos);
      };
    }
  },[showDrop]);

  // Show ALL matches
  const matched=hsnQ.length>0
    ?hsnList.filter(h=>
        h.code.startsWith(hsnQ)||
        h.code.includes(hsnQ)||
        h.desc.toLowerCase().includes(hsnQ.toLowerCase())
      ).slice(0,15)
    :[];
  const calc=updated=>{
    const qty=parseFloat(updated.qty)||0, rate=parseFloat(updated.rate)||0;
    const disc=parseFloat(updated.discount)||0, tax=parseFloat(updated.taxRate)||0;
    const gross=qty*rate, discAmt=gross*(disc/100), taxable=gross-discAmt;
    updated.taxable=taxable.toFixed(2);
    updated.gstAmt=(taxable*tax/100).toFixed(2);
    updated.total=(taxable*(1+tax/100)).toFixed(2);
    return updated;
  };
  const up=k=>e=>{const updated=calc({...row,[k]:e.target.value});onChange(idx,updated);};
  const selectHSN=h=>{
    const updated=calc({...row,hsnCode:h.code,taxRate:h.taxRate,unit:h.unit,desc:row.desc||h.desc});
    // Auto fill description ONLY if empty
    if(!row.desc) updated.desc=h.desc;
    onChange(idx,updated);
    setHsnQ(h.code);
    setShowDrop(false);
  };
  const taxLabel=gstType==='INTRA'?`CGST${parseFloat(row.taxRate||0)/2}%+SGST${parseFloat(row.taxRate||0)/2}%`:`IGST ${row.taxRate||0}%`;
  return <tr>
    <td className="p-sno">{idx+1}</td>
    <td style={{minWidth:220}}>
      <input className="p-input" value={row.desc||''} onChange={up('desc')} placeholder="Enter product/service description..."/>
    </td>
    <td style={{minWidth:130}}>
      <div className="hsn-wrap">
        <input ref={inputRef} className="p-input gold" value={hsnQ}
          onChange={e=>{setHsnQ(e.target.value);up('hsnCode')(e);setShowDrop(true);}}
          onFocus={()=>setShowDrop(true)}
          placeholder="HSN/SAC" style={{maxWidth:110}}/>
        {showDrop&&matched.length>0&&ReactDOM.createPortal(
          <div ref={dropRef} style={{
            position:'fixed',
            top:dropPos.top, left:dropPos.left,
            width:380, background:'var(--card)',
            border:'1.5px solid var(--border2)',
            borderRadius:10, boxShadow:'0 8px 40px rgba(0,0,0,0.4)',
            zIndex:99999, maxHeight:300, overflowY:'auto'
          }}>
            <div style={{padding:'6px 12px',fontSize:10,color:'var(--text3)',borderBottom:'1px solid var(--border)',fontWeight:600,background:'var(--card2)',borderRadius:'10px 10px 0 0'}}>
              🔍 {matched.length} result{matched.length!==1?'s':''} found
            </div>
            {matched.map((h,j)=>(
              <div key={j} className="hsn-opt" onMouseDown={(e)=>{e.preventDefault();selectHSN(h);}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span className="hsn-code">{h.code}</span>
                  <span className="badge badge-green" style={{fontSize:10}}>{h.taxRate}%</span>
                </div>
                <div className="hsn-desc">{h.desc}</div>
                {h.category&&<div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{h.category}</div>}
              </div>
            ))}
          </div>,
          document.body
        )}
      </div>
    </td>
    <td style={{minWidth:90}}>
      <select value={row.unit||'Nos'} onChange={up('unit')} className="p-input" style={{maxWidth:80}}>
        {UNITS.map(u=><option key={u} value={u}>{u}</option>)}
      </select>
    </td>
    <td style={{minWidth:70}}><input type="number" className="p-input r" value={row.qty||''} onChange={up('qty')} placeholder="1" min="0"/></td>
    <td style={{minWidth:90}}><input type="number" className="p-input r" value={row.rate||''} onChange={up('rate')} placeholder="0.00" min="0"/></td>
    <td style={{minWidth:60}}><input type="number" className="p-input r" value={row.discount||''} onChange={up('discount')} placeholder="0" min="0" max="100"/></td>
    <td style={{minWidth:80}}>
      <select value={row.taxRate||'18'} onChange={up('taxRate')} className="p-input" style={{maxWidth:72}}>
        {TAX_RATES.map(r=><option key={r} value={r}>{r}%</option>)}
      </select>
    </td>
    <td className="p-num" style={{minWidth:100}}>{fmt(row.taxable||0)}</td>
    <td style={{minWidth:130,fontSize:10,color:'var(--text3)',textAlign:'center',whiteSpace:'nowrap'}}>{taxLabel}</td>
    <td className="p-total" style={{minWidth:100}}>{fmt(row.total||0)}</td>
    <td style={{width:38}}>
      <button className="btn btn-icon btn-danger btn-sm" onClick={()=>onDelete(idx)}><Ic n="trash" s={13}/></button>
    </td>
  </tr>;
};

const Login = ({onLogin})=>{
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [showPw,setShowPw]=useState(false);
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const login=()=>{
    setErr('');setLoading(true);
    setTimeout(()=>{
      const users=seedUsers();
      const u=users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.password===pw);
      if(!u){setErr('Invalid email or password.');setLoading(false);return;}
      if(!u.active){setErr('Account is deactivated. Contact admin.');setLoading(false);return;}
      logAudit('USER_LOGIN',`Login from browser`,u);
      onLogin(u);setLoading(false);
    },600);
  };
  return <div className="login-bg">
    <div className="login-card">
      <div className="login-logo">InvoicePro</div>
      <div className="login-sub">GST Invoice Manager</div>

      <div className="field">

        <label className="field-label">Password</label>

          <input className="field-input" type={showPw?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()}/>
          <button className="pw-eye" onClick={()=>setShowPw(p=>!p)}>{showPw?<Ic n="eyeoff" s={14}/>:<Ic n="eye" s={14}/>}</button>
        </div>
      </div>
      {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:14,padding:'10px 14px',background:'rgba(239,68,68,0.08)',borderRadius:8,border:'1px solid rgba(239,68,68,0.2)'}}>{err}</div>}
      <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px',fontSize:14}} onClick={login} disabled={loading}>
        {loading?<><span className="spinner"/><span>Signing in...</span></>:<><Ic n="lock" s={14}/>Sign In</>}
      </button>

      <div style={{marginTop:28,borderTop:'1px solid var(--border)',paddingTop:20}}>

        <div style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px',fontSize:12}}>
          <div style={{color:'var(--text2)',marginBottom:8,lineHeight:1.6}}>
            For login credentials, technical support, or any issues with this application — please contact:
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderTop:'1px solid var(--border)'}}>
            <span style={{fontSize:15}}>📧</span>
            <a href="mailto:contact@business.com" style={{color:'var(--primary2)',fontWeight:600,textDecoration:'none',fontSize:13}}>contact@business.com</a>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderTop:'1px solid var(--border)'}}>
            <span style={{fontSize:15}}>📞</span>
            <a href="tel:+918800112233" style={{color:'var(--primary2)',fontWeight:600,textDecoration:'none',fontSize:13}}>+91 8800112233</a>

const newItem  = ()=>({desc:'',hsnCode:'',unit:'Nos',qty:1,rate:'',discount:0,taxRate:'18',taxable:0,gstAmt:0,total:0});
const newInvoice = (user,docType)=>({invNo:genInvNo(docType||'TAX INVOICE'),date:today(),dueDate:'',poNo:'',
  billTo:{name:'',address:'',city:'',state:'',pin:'',gstin:'',phone:'',email:''},
  shipTo:{name:'',address:'',city:'',state:'',pin:''},
  sameAddress:true,items:[newItem()],notes:'',gstType:'INTRA',docType:docType||'TAX INVOICE',isB2C:false,
  status:'Draft',sentToCustomer:false,paidDate:'',
  origInvNo:'',origInvDate:'',
  subtotal:0,taxBreakdown:{},totalGST:0,roundOff:0,grand:0,
  createdBy:user?.email||'',time:nowTime()
});

const InvoiceForm = ({currentUser,initial,onSave})=>{
  const [inv,setInv]=useState(()=>initial||newInvoice(currentUser));
  const co=S.get(SK.CO,{});
  const hsnList=S.get(SK.HSN,[]);
  const [showCustModal,setShowCustModal]=useState(false);
  const [custQ,setCustQ]=useState('');
  const [showCustDrop,setShowCustDrop]=useState(false);
  const custList=S.get(SK.CUST,[]);
  const custMatched=custQ.length>1?custList.filter(c=>c.name.toLowerCase().includes(custQ.toLowerCase())||c.gstin?.includes(custQ)).slice(0,6):[];
  const custInputRef=useRef();
  const custDropRef=useRef();
  useEffect(()=>{const h=e=>{if(custInputRef.current&&!custInputRef.current.contains(e.target)&&custDropRef.current&&!custDropRef.current.contains(e.target))setShowCustDrop(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);

  // ── Original Invoice autocomplete state ──
  const [origInvQ,setOrigInvQ]=useState(inv.origInvNo||'');
  const [showOrigDrop,setShowOrigDrop]=useState(false);
  const origInvRef=useRef();
  const origDropRef=useRef();
  // Only show TAX INVOICEs (not CN/DN) in the reference list
  const allTaxInvs=S.get(SK.INV,[]).filter(i=>i.docType==='TAX INVOICE'&&i.invNo);
  const origMatched=origInvQ.length>0
    ?allTaxInvs.filter(i=>i.invNo.toLowerCase().includes(origInvQ.toLowerCase())||(i.billTo?.name||'').toLowerCase().includes(origInvQ.toLowerCase())).slice(0,8)
    :allTaxInvs.slice(-8).reverse(); // show 8 most recent when field is focused but empty
  useEffect(()=>{const h=e=>{if(origInvRef.current&&!origInvRef.current.contains(e.target)&&origDropRef.current&&!origDropRef.current.contains(e.target))setShowOrigDrop(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);
  // Sync origInvQ when inv.origInvNo changes from outside (e.g. loading from history)
  useEffect(()=>{setOrigInvQ(inv.origInvNo||'');},[inv.origInvNo]);
  // Reset origInvQ when docType flips between note types
  useEffect(()=>{
    if(inv.docType!=='CREDIT NOTE'&&inv.docType!=='DEBIT NOTE'){
      setOrigInvQ(''); setShowOrigDrop(false);
    }
  },[inv.docType]);

  const fillCustomer=c=>{
    setInv(p=>({...p,billTo:{name:c.name,address:c.address||'',city:c.city||'',state:c.state||'',pin:c.pin||'',gstin:c.gstin||'',phone:c.phone||'',email:c.email||''}}));
    setCustQ(c.name);setShowCustDrop(false);
  };
  const saveCustomerFromBillTo=()=>{
    const bt=inv.billTo;
    if(!bt.name){toast.error('Customer name required');return;}
    const existing=custList.findIndex(c=>c.name.toLowerCase()===bt.name.toLowerCase());
    let u;
    if(existing>=0){u=custList.map((c,i)=>i===existing?{...c,...bt}:c);toast.success('Customer updated in database!');}
    else{u=[...custList,{...bt,createdAt:new Date().toISOString()}];toast.success('Customer saved to database!');}
    S.set(SK.CUST,u);
  };

  const STATUS_CFG={
    'Draft':    {bg:'#F1F5F9',color:'#475569',border:'#CBD5E1'},
    'Sent':     {bg:'#EFF6FF',color:'#1D4ED8',border:'#BFDBFE'},
    'Paid':     {bg:'#F0FDF4',color:'#166534',border:'#86EFAC'},
    'Overdue':  {bg:'#FEF2F2',color:'#DC2626',border:'#FECACA'},
  };

  // Recalculate totals
  useEffect(()=>{
    const items=inv.items||[];
    let sub=0,gstMap={};
    items.forEach(r=>{
      const taxable=parseFloat(r.taxable)||0, gst=parseFloat(r.gstAmt)||0, rate=r.taxRate||'0';
      sub+=taxable;gstMap[rate]=(gstMap[rate]||0)+gst;
    });
    const tgst=Object.values(gstMap).reduce((a,b)=>a+b,0);
    const raw=sub+tgst, rounded=Math.round(raw), roff=parseFloat((rounded-raw).toFixed(2));
    setInv(p=>({...p,subtotal:sub.toFixed(2),taxBreakdown:gstMap,totalGST:tgst.toFixed(2),roundOff:roff,grand:rounded}));
  },[JSON.stringify(inv.items)]);

  // GST type determination — B2C uses manual toggle, B2B uses GSTIN comparison
  useEffect(()=>{
    if(inv.isB2C) return; // B2C gstType is set manually via toggle
    const sc=stateCode(co.gstin),bc=stateCode(inv.billTo?.gstin);
    let type='INTRA';
    if(sc&&bc&&sc!==bc)type='INTER';
    setInv(p=>({...p,gstType:type}));
  },[inv.billTo?.gstin, inv.isB2C]);

  const upB=k=>e=>setInv(p=>({...p,billTo:{...p.billTo,[k]:e.target.value}}));
  const upS=k=>e=>setInv(p=>({...p,shipTo:{...p.shipTo,[k]:e.target.value}}));
  const upF=k=>e=>setInv(p=>({...p,[k]:e.target.value}));
  const addItem=()=>setInv(p=>({...p,items:[...p.items,newItem()]}));
  const updateItem=(i,u)=>setInv(p=>({...p,items:p.items.map((it,j)=>j===i?u:it)}));
  const deleteItem=i=>setInv(p=>({...p,items:p.items.filter((_,j)=>j!==i)}));

  const save=(autoNew=false)=>{
    if(!inv.billTo?.name){toast.error('Customer name required');return;}
    const isCN = inv.docType==='CREDIT NOTE';
    const grandVal = isCN ? -Math.abs(inv.grand||0) : Math.abs(inv.grand||0);
    // Always store GSTIN in uppercase
    const cleanBillTo = {...inv.billTo, gstin:(inv.billTo?.gstin||'').toUpperCase()};
    const toSave = {...inv, grand: grandVal, billTo: cleanBillTo};
    const invs=S.get(SK.INV,[]);
    const ex=invs.findIndex(i=>i.invNo===inv.invNo);
    let updated;
    const isEdit = ex>=0;
    if(isEdit){updated=[...invs];updated[ex]={...toSave};}else{updated=[...invs,{...toSave}];}
    S.set(SK.INV,updated);
    logAudit(isEdit?'INVOICE_EDITED':'INVOICE_CREATED', `${inv.docType} ${inv.invNo} — ${inv.billTo?.name} — ₹${Math.abs(grandVal)}`, currentUser);
    if(onSave)onSave(toSave);
    toast.success(`${inv.docType} ${inv.invNo} saved!`);
    if(autoNew) setTimeout(()=>setInv(newInvoice(currentUser)),400);
  };

  const gstType=inv.gstType;
  const sellerSC=stateCode(co.gstin);
  const buyerGSTINOK=inv.billTo?.gstin?validateGSTIN(inv.billTo.gstin):true;
  const terms=S.get(SK.TERMS,DEFAULT_TERMS);

  return <div>
    {/* Invoice Header */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18,gap:10}}>
      <div className="inv-header-left">
        <div className="inv-title" style={{fontFamily:'Sora,sans-serif',fontSize:26,fontWeight:800,color:'var(--text)'}}>
          {inv.docType==='DEBIT NOTE'?'New Debit Note':inv.docType==='CREDIT NOTE'?'New Credit Note':inv.isB2C?'New B2C Invoice':'New Tax Invoice'}
        </div>
        <div className="inv-co-row" style={{color:'var(--text3)',fontSize:13,marginTop:3,display:'flex',alignItems:'center',gap:6}}>
          {co.name&&<span style={{color:'var(--text2)',fontWeight:600,flexShrink:0}}>{co.name}</span>}
          {co.gstin&&<span style={{fontFamily:'monospace',fontSize:11,flexShrink:0}}>{co.gstin}</span>}
          {sellerSC&&<span className="badge badge-primary" style={{flexShrink:0}}>{stateName(co.gstin)}</span>}
        </div>
      </div>
      <div className="inv-no-badge" style={{flexShrink:0}}>{inv.invNo}</div>
    </div>

    {!co.name&&<div className="alert alert-warn"><span>⚠️</span><span>Please configure <strong>Company Details</strong> before creating invoices.</span></div>}

    {/* Invoice Meta */}
    <div className="card" style={{marginBottom:16}}>
      {/* Document Type Selector */}
      <div style={{marginBottom:16}}>
        <div className="field-label" style={{marginBottom:8}}>Document Type</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {[['TAX INVOICE','var(--primary)','var(--primary-bg)','var(--primary2)','📄 Tax Invoice (B2B)',false],
            ['TAX INVOICE','#0369A1','#E0F2FE','#0369A1','🧾 Tax Invoice (B2C)',true],
            ['DEBIT NOTE','#B45309','#FEF3C7','#92400E','📈 Debit Note',false],
            ['CREDIT NOTE','#065F46','#D1FAE5','#064E3B','📉 Credit Note',false]].map(([dt,bc,bg,tc,label,b2c])=>{
            const isActive = inv.docType===dt && (!!inv.isB2C===b2c);
            return(
            <button key={label} onClick={()=>{
              const newNo=genInvNo(dt);
              // Reset orig invoice fields when switching doc types
              const wasNote=(inv.docType==='CREDIT NOTE'||inv.docType==='DEBIT NOTE');
              const isNote=(dt==='CREDIT NOTE'||dt==='DEBIT NOTE');
              const typeChanged = inv.docType!==dt || (!!inv.isB2C!==b2c);
              if(typeChanged && (wasNote||isNote)){
                setOrigInvQ('');
                setShowOrigDrop(false);
              }
              setInv(p=>({...p,docType:dt,invNo:newNo,isB2C:b2c,
                origInvNo: typeChanged&&(wasNote||isNote)?'':'',
                origInvDate: typeChanged&&(wasNote||isNote)?'':'',
                gstType: b2c?'INTRA':p.gstType
              }));
            }}
              style={{padding:'7px 18px',borderRadius:8,
                border:`2px solid ${isActive?bc:'var(--border2)'}`,
                background:isActive?bg:'transparent',
                color:isActive?tc:'var(--text2)',
                fontWeight:isActive?700:500,fontSize:12,cursor:'pointer',transition:'all 0.2s',letterSpacing:'0.3px'}}>
              {label}
            </button>);
          })}
        </div>
        {inv.docType==='CREDIT NOTE'&&<div style={{marginTop:8,fontSize:11,color:'#065F46',background:'#D1FAE5',padding:'5px 10px',borderRadius:6}}>
          ⚠️ Credit Note values will be stored as <strong>negative</strong> and will reduce revenue totals.
        </div>}
        {/* Original Invoice Reference — only for Credit Note & Debit Note */}
        {(inv.docType==='CREDIT NOTE'||inv.docType==='DEBIT NOTE')&&(
          <div style={{marginTop:12,padding:'14px 16px',background:inv.docType==='CREDIT NOTE'?'rgba(16,185,129,0.07)':'rgba(245,158,11,0.07)',borderRadius:12,border:`1px solid ${inv.docType==='CREDIT NOTE'?'rgba(16,185,129,0.25)':'rgba(245,158,11,0.25)'}`}}>
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <div style={{width:28,height:28,borderRadius:8,background:inv.docType==='CREDIT NOTE'?'rgba(16,185,129,0.15)':'rgba(245,158,11,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>
                {inv.docType==='CREDIT NOTE'?'📉':'📈'}
              </div>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:inv.docType==='CREDIT NOTE'?'var(--green)':'var(--gold)',textTransform:'uppercase',letterSpacing:'0.7px'}}>
                  Original Invoice Reference
                </div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>Required for GST filing — select from your saved invoices</div>
              </div>
              {inv.origInvNo&&<div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:20,background:inv.docType==='CREDIT NOTE'?'rgba(16,185,129,0.1)':'rgba(245,158,11,0.1)',border:`1px solid ${inv.docType==='CREDIT NOTE'?'rgba(16,185,129,0.3)':'rgba(245,158,11,0.3)'}`,fontSize:11,fontWeight:700,color:inv.docType==='CREDIT NOTE'?'var(--green)':'var(--gold)'}}>
                <span>✓</span><span>Linked</span>
              </div>}
            </div>
            <div className="g2">
              {/* ── Invoice No Search ── */}
              <div className="field" style={{marginBottom:0,position:'relative'}}>
                <label className="field-label">Original Invoice No *</label>
                <div ref={origInvRef} style={{position:'relative'}}>
                  <input className="field-input" value={origInvQ}
                    onChange={e=>{setOrigInvQ(e.target.value);setInv(p=>({...p,origInvNo:e.target.value,origInvDate:''}));setShowOrigDrop(true);}}
                    onFocus={()=>setShowOrigDrop(true)}
                    placeholder="Type to search invoices…"
                    style={{fontFamily:'monospace',paddingRight:32,
                      borderColor: inv.origInvNo ? (inv.docType==='CREDIT NOTE'?'rgba(16,185,129,0.5)':'rgba(245,158,11,0.5)') : undefined
                    }}
                    autoComplete="off"
                  />
                  {/* Clear button */}
                  {origInvQ&&<button onClick={()=>{setOrigInvQ('');setInv(p=>({...p,origInvNo:'',origInvDate:''}));}}
                    style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',padding:0}}>✕</button>}
                </div>
                {/* Dropdown */}
                {showOrigDrop&&origMatched.length>0&&ReactDOM.createPortal(
                  <div ref={origDropRef} style={{position:'fixed',zIndex:9999,background:'var(--card)',border:'1px solid var(--border2)',borderRadius:10,boxShadow:'0 8px 32px rgba(0,0,0,0.4)',overflow:'hidden',minWidth:320,maxWidth:460,maxHeight:280,overflowY:'auto',
                    ...(() => {
                      const el = origInvRef.current?.querySelector('input');
                      if(!el)return{top:200,left:200};
                      const r=el.getBoundingClientRect();
                      return{top:r.bottom+4,left:r.left};
                    })()
                  }}>
                    <div style={{padding:'8px 12px 6px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.6px',borderBottom:'1px solid var(--border)'}}>
                      {origInvQ?`Results for "${origInvQ}"`:'Recent Invoices'}
                    </div>
                    {origMatched.map((oi,idx)=>(
                      <div key={idx}
                        onMouseDown={e=>{
                          e.preventDefault();
                          setOrigInvQ(oi.invNo);
                          setInv(p=>({...p,origInvNo:oi.invNo,origInvDate:oi.date||''}));
                          setShowOrigDrop(false);
                          toast.success(`Linked to ${oi.invNo}`);
                        }}
                        style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',transition:'background 0.1s'}}
                        onMouseEnter={e=>e.currentTarget.style.background='var(--card2)'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                      >
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                          <span style={{fontFamily:'monospace',fontWeight:700,fontSize:13,color:inv.docType==='CREDIT NOTE'?'var(--green)':'var(--gold)'}}>{oi.invNo}</span>
                          <span style={{fontSize:11,color:'var(--text3)',flexShrink:0}}>{fmtDate(oi.date)||''}</span>
                        </div>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:3}}>
                          <span style={{fontSize:12,color:'var(--text2)',fontWeight:500}}>{oi.billTo?.name||'Unknown Customer'}</span>
                          <span style={{fontSize:11,fontWeight:600,color:'var(--primary2)'}}>₹{Number(Math.abs(oi.grand||0)).toLocaleString('en-IN')}</span>
                        </div>
                      </div>
                    ))}
                    {origMatched.length===0&&origInvQ.length>0&&<div style={{padding:'14px',textAlign:'center',color:'var(--text3)',fontSize:12}}>No invoices found for "{origInvQ}"</div>}
                  </div>,
                  document.body
                )}
              </div>
              {/* ── Auto-filled Date ── */}
              <div className="field" style={{marginBottom:0}}>
                <label className="field-label">
                  Original Invoice Date *
                  {inv.origInvDate&&<span style={{marginLeft:6,fontSize:10,color:'var(--green)',fontWeight:600}}>✓ Auto-filled</span>}
                </label>
                <input type="date" className="field-input" value={inv.origInvDate||''} onChange={upF('origInvDate')}
                  style={{borderColor: inv.origInvDate ? 'rgba(16,185,129,0.4)' : undefined,
                    background: inv.origInvDate ? 'rgba(16,185,129,0.04)' : undefined}}
                />
                {!inv.origInvDate&&<div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>Auto-filled when you select an invoice above</div>}
              </div>
            </div>
          </div>
        )}
        {/* B2C Inter/Intra toggle */}
        {inv.isB2C&&(
          <div style={{marginTop:10,display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>GST Type:</span>
            {[['INTRA','Intra-State (CGST + SGST)','#1D4ED8','#DBEAFE'],['INTER','Inter-State (IGST)','#065F46','#D1FAE5']].map(([type,label,color,bg])=>(
              <button key={type} onClick={()=>setInv(p=>({...p,gstType:type}))}
                style={{padding:'5px 16px',borderRadius:7,fontSize:12,fontWeight:inv.gstType===type?700:500,cursor:'pointer',
                  border:`2px solid ${inv.gstType===type?color:'var(--border2)'}`,
                  background:inv.gstType===type?bg:'transparent',
                  color:inv.gstType===type?color:'var(--text2)',transition:'all 0.2s'}}>
                {label}
              </button>
            ))}
            <span style={{fontSize:11,color:'var(--text3)'}}>
              {inv.gstType==='INTRA'?'→ CGST + SGST applies':'→ IGST applies'}
            </span>
          </div>
        )}
      </div>
      <div className="g4">
        <div className="field">
          <label className="field-label">Invoice Number</label>
          <input className="field-input" value={inv.invNo} onChange={upF('invNo')} style={{fontFamily:'monospace',fontWeight:700,color:'var(--gold)'}}/>
        </div>
        <div className="field">
          <label className="field-label">Invoice Date</label>
          <input type="date" className="field-input" value={inv.date} onChange={upF('date')}/>
        </div>
        <div className="field">
          <label className="field-label">Due Date</label>
          <input type="date" className="field-input" value={inv.dueDate} onChange={upF('dueDate')}/>
        </div>
        <div className="field">
          <label className="field-label">PO / Ref No.</label>
          <input className="field-input" value={inv.poNo||''} onChange={upF('poNo')} placeholder="PO-001 (optional)"/>
        </div>
      </div>
    </div>

    {/* Customer */}
    <div className="g2" style={{marginBottom:16}}>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div className="section-title" style={{marginBottom:0}}><span className="dot"></span>Bill To</div>
          <div style={{display:'flex',gap:6}}>
            <button className="btn btn-sm btn-outline-primary" onClick={()=>setShowCustModal(true)} title="Pick from Customer Database">
              <Ic n="users" s={12}/>Customer DB
            </button>
            <button className="btn btn-sm btn-outline" onClick={saveCustomerFromBillTo} title="Save this customer to database">
              <Ic n="save" s={12}/>Save Customer
            </button>
          </div>
        </div>
        {/* Customer name with autocomplete */}
        <div className="field" style={{position:'relative'}}>
          <label className="field-label">Customer Name *</label>
          <input ref={custInputRef} className="field-input" value={inv.billTo.name}
            onChange={e=>{upB('name')(e);setCustQ(e.target.value);setShowCustDrop(true);}}
            onFocus={()=>{setCustQ(inv.billTo.name);setShowCustDrop(true);}}
            placeholder="Type to search saved customers..."/>
          {showCustDrop&&custMatched.length>0&&ReactDOM.createPortal(
            <div ref={custDropRef} style={{position:'fixed',
              top:(()=>{const r=custInputRef.current?.getBoundingClientRect();return r?r.bottom+4:0})(),
              left:(()=>{const r=custInputRef.current?.getBoundingClientRect();return r?r.left:0})(),
              width:380,background:'var(--card)',border:'1.5px solid var(--border2)',
              borderRadius:10,boxShadow:'0 8px 40px rgba(0,0,0,0.4)',zIndex:99999,maxHeight:220,overflowY:'auto'}}>
              <div style={{padding:'5px 12px',fontSize:10,color:'var(--text3)',borderBottom:'1px solid var(--border)',fontWeight:700,background:'var(--card2)',borderRadius:'10px 10px 0 0'}}>
                👥 {custMatched.length} customer{custMatched.length!==1?'s':''} found
              </div>
              {custMatched.map((c,i)=>(
                <div key={i} className="hsn-opt" onMouseDown={e=>{e.preventDefault();fillCustomer(c);}}>
                  <div style={{display:'flex',justifyContent:'space-between'}}>
                    <span style={{fontWeight:700,color:'var(--text)'}}>{c.name}</span>
                    {c.gstin&&<span style={{fontSize:10,fontFamily:'monospace',color:'var(--gold)'}}>{c.gstin}</span>}
                  </div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{[c.city,c.state].filter(Boolean).join(', ')}</div>
                </div>
              ))}
            </div>, document.body
          )}
        </div>
        <div className="field"><label className="field-label">Address</label><textarea className="field-input" value={inv.billTo.address} onChange={upB('address')} rows={2} placeholder="Street, Area"/></div>
        <div className="g3">
          <div className="field"><label className="field-label">City</label><input className="field-input" value={inv.billTo.city} onChange={upB('city')} placeholder="City"/></div>
          <div className="field"><label className="field-label">State</label><input className="field-input" value={inv.billTo.state} onChange={upB('state')} placeholder="State"/></div>
          <div className="field"><label className="field-label">PIN</label><input className="field-input" value={inv.billTo.pin} onChange={upB('pin')} placeholder="560001" maxLength={6}/></div>
        </div>
        <div className="g2">
          {inv.isB2C?(
            <div className="field">
              <label className="field-label">Customer State</label>
              <input className="field-input" value={inv.billTo.state||''} onChange={upB('state')} placeholder="e.g. Karnataka"/>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>B2C — no GSTIN required. Use toggle above for GST type.</div>
            </div>
          ):(
            <div className="field gstin-wrap">
              <label className="field-label">Customer GSTIN</label>
              <div style={{position:'relative'}}>
                <input className="field-input" value={inv.billTo.gstin||''} onChange={e=>setInv(p=>({...p,billTo:{...p.billTo,gstin:e.target.value.toUpperCase()}}))} placeholder="29XXXXX0000X1Z5" maxLength={15} style={{textTransform:'uppercase',paddingRight:72}}/>
                {inv.billTo.gstin&&<span className="gstin-badge" style={{color:buyerGSTINOK?'var(--green)':'var(--red)'}}>{buyerGSTINOK?'✓ Valid':'✗ Invalid'}</span>}
              </div>
            </div>
          )}
          <div className="field"><label className="field-label">Phone</label><input className="field-input" value={inv.billTo.phone||''} onChange={upB('phone')}/></div>
        </div>
        <div className="field"><label className="field-label">Email</label><input className="field-input" value={inv.billTo.email||''} onChange={upB('email')}/></div>
      </div>

      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div className="section-title" style={{marginBottom:0}}><span className="dot"></span>Ship To</div>
          <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:12,color:'var(--text2)'}}>
            <input type="checkbox" checked={inv.sameAddress} onChange={e=>setInv(p=>({...p,sameAddress:e.target.checked}))} style={{accentColor:'var(--primary)'}}/>
            Same as Bill To
          </label>
        </div>
        {inv.sameAddress?(
          <div style={{textAlign:'center',padding:'32px 0',color:'var(--text3)'}}>
            <div style={{fontSize:36,marginBottom:8}}>📦</div>
            <div style={{fontSize:13}}>Shipping address same as billing address</div>
          </div>
        ):(
          <>
            <div className="field"><label className="field-label">Recipient Name</label><input className="field-input" value={inv.shipTo.name||inv.billTo.name} onChange={upS('name')}/></div>
            <div className="field"><label className="field-label">Address</label><textarea className="field-input" value={inv.shipTo.address} onChange={upS('address')} rows={2}/></div>
            <div className="g3">
              <div className="field"><label className="field-label">City</label><input className="field-input" value={inv.shipTo.city} onChange={upS('city')}/></div>
              <div className="field"><label className="field-label">State</label><input className="field-input" value={inv.shipTo.state} onChange={upS('state')}/></div>
              <div className="field"><label className="field-label">PIN</label><input className="field-input" value={inv.shipTo.pin} onChange={upS('pin')} maxLength={6}/></div>
            </div>
          </>
        )}
        {/* Status + Sent Panel */}
        <div style={{marginTop:12,padding:'12px 14px',background:'var(--card2)',borderRadius:10,border:'1px solid var(--border)'}}>
          <div style={{fontWeight:700,color:'var(--text2)',fontSize:11,textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:10}}>Invoice Status</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {Object.entries(STATUS_CFG).map(([st,cfg])=>(
              <button key={st} onClick={()=>setInv(p=>({...p,status:st,paidDate:st==='Paid'?today():p.paidDate}))}
                style={{padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:inv.status===st?700:500,cursor:'pointer',
                  border:`2px solid ${inv.status===st?cfg.color:cfg.border}`,
                  background:inv.status===st?cfg.bg:'transparent',
                  color:inv.status===st?cfg.color:'var(--text3)',transition:'all 0.15s'}}>
                {st==='Draft'?'📝':st==='Sent'?'📤':st==='Paid'?'✅':'⚠️'} {st}
              </button>
            ))}
          </div>
          {inv.status==='Paid'&&(
            <div className="field" style={{marginBottom:8}}>
              <label className="field-label">Payment Received Date</label>
              <input type="date" className="field-input" value={inv.paidDate||''} onChange={upF('paidDate')}/>
            </div>
          )}
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12}}>
            <input type="checkbox" checked={!!inv.sentToCustomer}
              onChange={e=>setInv(p=>({...p,sentToCustomer:e.target.checked,status:e.target.checked&&p.status==='Draft'?'Sent':p.status}))}
              style={{accentColor:'var(--primary)',width:14,height:14}}/>
            <span style={{color:'var(--text2)'}}>📤 Sent to customer</span>
            {inv.sentToCustomer&&<span style={{fontSize:10,color:'#1D4ED8',background:'#EFF6FF',padding:'1px 7px',borderRadius:10,border:'1px solid #BFDBFE'}}>✓ Sent</span>}
          </label>
        </div>
        {/* GST info */}
        <div style={{marginTop:10,padding:'10px 14px',background:'var(--card2)',borderRadius:8,fontSize:12}}>
          <div style={{fontWeight:700,color:'var(--text2)',marginBottom:4}}>GST Determination</div>
          <div style={{color:'var(--text3)'}}>Seller: <span style={{color:'var(--text)'}}>{sellerSC?stateName(co.gstin):'Not configured'}</span></div>
          {inv.billTo?.gstin&&<div style={{color:'var(--text3)'}}>Buyer: <span style={{color:'var(--text)'}}>{stateName(inv.billTo.gstin)}</span></div>}
          <div style={{marginTop:6}}>
            <span className={`badge ${gstType==='INTRA'?'badge-green':'badge-blue'}`}>{gstType==='INTRA'?'CGST + SGST (Intra)':'IGST (Inter-State)'}</span>
          </div>
        </div>
      </div>
    </div>
    {showCustModal&&<CustomerModal onClose={()=>setShowCustModal(false)} onSelect={fillCustomer}/>}

    {/* Products Table */}
    <div className="card" style={{marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div className="section-title" style={{marginBottom:0}}><span className="dot"></span>Products / Services</div>
        <button className="btn btn-outline-primary btn-sm" onClick={addItem}><Ic n="plus" s={13}/>Add Row</button>
      </div>
      <div className="table-wrap">
        <table className="ptable">
          <thead>
            <tr>
              <th style={{width:28}}>#</th>
              <th>Description (auto-fills from HSN)</th>
              <th>HSN / SAC Code</th>
              <th>Unit</th>
              <th className="r">Qty</th>
              <th className="r">Rate (₹)</th>
              <th className="r">Disc%</th>
              <th>GST%</th>
              <th className="r">Taxable</th>
              <th>Tax Split</th>
              <th className="r">Total</th>
              <th style={{width:38}}></th>
            </tr>
          </thead>
          <tbody>
            {inv.items.map((row,i)=>(
              <ProductRow key={i} row={row} idx={i} onChange={updateItem} onDelete={deleteItem} hsnList={hsnList} gstType={gstType}/>
            ))}
          </tbody>
          <tfoot>
            <tr><td colSpan={12} style={{padding:'8px 10px'}}>
              <button className="btn btn-outline btn-sm" onClick={addItem}><Ic n="plus" s={12}/>Add Another Row</button>
            </td></tr>
          </tfoot>
        </table>
      </div>
    </div>

    {/* Bottom: Notes + Tax Summary */}
    <div className="two-col" style={{marginBottom:16}}>
      <div>
        <div className="field"><label className="field-label">Notes / Remarks</label><textarea className="field-input" value={inv.notes||''} onChange={upF('notes')} rows={3} placeholder="Payment instructions, additional notes..."/></div>
        <div className="card-sm">
          <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:8}}>Terms & Conditions</div>
          {(terms||DEFAULT_TERMS).split('\n').filter(Boolean).map((t,i)=>(
            <div key={i} style={{fontSize:12,color:'var(--text3)',lineHeight:1.8}}>{t}</div>
          ))}
        </div>
        {(co.bankName||co.bankAccount)&&(
          <div className="card-sm" style={{marginTop:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.6px',marginBottom:8,display:'flex',alignItems:'center',gap:6}}><Ic n="bank" s={12}/>Bank Details</div>
            {[[co.bankName,'Bank'],[co.bankAccount,'A/c No.'],[co.bankIFSC,'IFSC'],[co.bankBranch,'Branch']].filter(([v])=>v).map(([val,lbl],i)=>(
              <div key={i} style={{display:'flex',fontSize:13,padding:'4px 0',borderBottom:'1px solid var(--border)'}}><span style={{color:'var(--text3)',minWidth:90,fontSize:12}}>{lbl}</span><span style={{fontWeight:600,color:'var(--text)'}}>{val}</span></div>
            ))}
          </div>
        )}
      </div>

      <div>
        <div className="tax-box" style={{marginBottom:10}}>
          <div className="tax-row"><span className="tax-label">Sub Total (Taxable)</span><span className="tax-val">{fmt(inv.subtotal)}</span></div>
          {Object.entries(inv.taxBreakdown||{}).filter(([,a])=>a>0).flatMap(([rate,amt])=>
            gstType==='INTRA'?[
              <div key={`c${rate}`} className="tax-row"><span className="tax-label">CGST @ {parseFloat(rate)/2}%</span><span className="tax-val" style={{color:'var(--text2)'}}>{fmt(amt/2)}</span></div>,
              <div key={`s${rate}`} className="tax-row"><span className="tax-label">SGST @ {parseFloat(rate)/2}%</span><span className="tax-val" style={{color:'var(--text2)'}}>{fmt(amt/2)}</span></div>
            ]:[
              <div key={`i${rate}`} className="tax-row"><span className="tax-label">IGST @ {rate}%</span><span className="tax-val" style={{color:'var(--text2)'}}>{fmt(amt)}</span></div>
            ]
          )}
          <div className="tax-row"><span className="tax-label">Total Tax</span><span className="tax-val">{fmt(inv.totalGST)}</span></div>
          {inv.roundOff!==0&&<div className="tax-row"><span className="tax-label">Round Off</span><span className="tax-val" style={{fontSize:12,color:'var(--text3)'}}>{inv.roundOff>0?'+':''}{fmt(Math.abs(inv.roundOff))}</span></div>}
          <div className="tax-row total-row"><span className="tax-label">Grand Total</span><span className="tax-val">{fmt(inv.grand)}</span></div>
        </div>
        <div className="amt-words">{numberToWords(inv.grand)}</div>
      </div>
    </div>

    {/* Actions */}
    <div style={{display:'flex',gap:10,justifyContent:'space-between',alignItems:'center',padding:'16px 0',borderTop:'1px solid var(--border)',flexWrap:'wrap'}}>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        {/* Status badge */}
        {inv.status&&(()=>{const cfg=STATUS_CFG[inv.status]||{};return(
          <span style={{padding:'4px 12px',borderRadius:20,fontSize:11,fontWeight:700,
            background:cfg.bg,color:cfg.color,border:`1.5px solid ${cfg.border}`}}>
            {inv.status==='Draft'?'📝':inv.status==='Sent'?'📤':inv.status==='Paid'?'✅':'⚠️'} {inv.status}
          </span>
        );})()}
        {inv.sentToCustomer&&<span style={{fontSize:11,color:'#1D4ED8',background:'#EFF6FF',padding:'4px 10px',borderRadius:20,border:'1px solid #BFDBFE'}}>📤 Sent to Customer</span>}
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-outline" onClick={()=>{if(window.confirm('Start new invoice?'))setInv(newInvoice(currentUser));}}><Ic n="new" s={14}/>New Invoice</button>
        <button className="btn btn-outline-primary" onClick={()=>save(false)}><Ic n="save" s={14}/>Save</button>
        <button className="btn btn-outline" style={{borderColor:'#1D4ED8',color:'#1D4ED8'}}
          onClick={()=>setInv(p=>({...p,sentToCustomer:true,status:p.status==='Draft'?'Sent':p.status}))}>
          📤 Mark Sent
        </button>
        <button className="btn btn-gold" onClick={()=>{save(true);makePDF(inv,co,terms);}}>
          <Ic n="pdf" s={15}/>Download PDF + New
        </button>
      </div>
    </div>
  </div>;
};

/* ── APP ── */
const App = ()=>{
  const [user,setUser]=useState(null);
  const [theme,setTheme]=useState('dark');
  const [modal,setModal]=useState(null);
  const [loadedInv,setLoadedInv]=useState(null);
  const [formKey,setFormKey]=useState(0);
  const [appReady,setAppReady]=useState(false);
  const [loadMsg,setLoadMsg]=useState('Connecting to cloud...');

  // Load Firebase cache before anything else
  useEffect(()=>{
    (async()=>{
      setLoadMsg('Loading your data from cloud...');
      await loadCache();
      setLoadMsg('Almost ready...');
      seedUsers();
      const savedTheme = S.get(SK.THEME,'dark');
      setTheme(savedTheme);
      document.documentElement.setAttribute('data-theme', savedTheme);
      setAppReady(true);
    })();
  },[]);

  useEffect(()=>{
    if(appReady){
      document.documentElement.setAttribute('data-theme',theme);
      S.set(SK.THEME,theme);
    }
  },[theme]);

  const login=u=>{setUser(u);toast.success(`Welcome, ${u.name}!`);};
  const [menuOpen, setMenuOpen] = useState(false);
  const openModal = (m) => { setModal(m); setMenuOpen(false); };

  const logout=()=>{setUser(null);toast.info('Logged out');};
  const loadInv=inv=>{setLoadedInv(inv);setFormKey(k=>k+1);};

  // Loading screen
  if(!appReady) return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#080C18',gap:24}}>
      <div style={{fontFamily:'Sora,sans-serif',fontSize:32,fontWeight:800,color:'#60A5FA',letterSpacing:2}}>InvoicePro</div>
      <div style={{fontSize:13,color:'#4A5A7A',letterSpacing:1}}>{loadMsg}</div>
      <div style={{width:48,height:48,border:'4px solid #1A2238',borderTop:'4px solid #3B82F6',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{fontSize:11,color:'#2A3856',marginTop:8}}>Powered by Firebase Cloud 🔥</div>
    </div>
  );

  if(!user) return <><Login onLogin={login}/><Toast/></>;

  const invCount=(S.get(SK.INV,[])).length;
  const isAdmin=user.role==='admin'||user.role==='superadmin';

  return <div>
    <Toast/>

    {/* ── MOBILE DRAWER ── */}
    {menuOpen&&<div className="mob-drawer" onClick={e=>{if(e.target===e.currentTarget)setMenuOpen(false)}}>
      <div className="mob-drawer-backdrop" onClick={()=>setMenuOpen(false)}/>
      <div className="mob-drawer-panel">
        {/* User row */}
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px 14px',borderBottom:'1px solid var(--border)',marginBottom:8}}>
          <div className="user-avatar" style={{width:36,height:36,fontSize:14}}>{user.name[0]}</div>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>{user.name}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{user.email}</div>
          </div>
          <div style={{marginLeft:'auto',cursor:'pointer',padding:'6px 12px',background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,fontSize:12,color:'var(--text2)'}}
            onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>
            {theme==='dark'?'☀️ Light':'🌙 Dark'}
          </div>
        </div>

        {/* Nav items */}
        <div onClick={()=>openModal('history')} className="mob-nav-item">
          <span style={{fontSize:18}}>📋</span>
          <span>History</span>
          {invCount>0&&<span style={{marginLeft:'auto',background:'var(--primary)',color:'#fff',borderRadius:20,padding:'1px 8px',fontSize:11,fontWeight:700}}>{invCount}</span>}
        </div>
        <div onClick={()=>openModal('expenses')} className="mob-nav-item">
          <span style={{fontSize:18}}>🧾</span><span>Expenses / Purchases</span>
        </div>
        <div onClick={()=>openModal('customers')} className="mob-nav-item">
          <span style={{fontSize:18}}>👥</span><span>Customer Database</span>
        </div>
        <div className="mob-nav-sep"/>
        <div onClick={()=>openModal('company')} className="mob-nav-item blue">
          <span style={{fontSize:18}}>🏢</span><span>Company Settings</span>
        </div>
        <div onClick={()=>openModal('hsn')} className="mob-nav-item gold">
          <span style={{fontSize:18}}>🏷️</span><span>HSN Database</span>
        </div>
        <div onClick={()=>openModal('terms')} className="mob-nav-item">
          <span style={{fontSize:18}}>📄</span><span>Terms & Conditions</span>
        </div>
        <div onClick={()=>{pickSaveFolder();setMenuOpen(false);}} className="mob-nav-item">
          <span style={{fontSize:18}}>📁</span><span>Auto-Save PDF Folder</span>
        </div>
        {isAdmin&&<><div className="mob-nav-sep"/>
        <div onClick={()=>openModal('admin')} className="mob-nav-item" style={{background:'linear-gradient(135deg,rgba(245,158,11,0.08),rgba(245,158,11,0.04))',border:'1px solid rgba(245,158,11,0.2)'}}>
          <span style={{fontSize:18}}>🛡️</span>
          <span style={{color:'var(--gold)',fontWeight:700}}>{isSuperAdmin(user.email)?'👑 Super Admin Panel':'Admin Panel'}</span>
        </div></>}
        <div className="mob-nav-sep"/>
        <div onClick={()=>{logout();setMenuOpen(false);}} className="mob-nav-item" style={{color:'var(--red)'}}>
          <span style={{fontSize:18}}>🚪</span><span>Logout</span>
        </div>
      </div>
    </div>}

    {/* ── HEADER ── */}
    <header className="app-header">
      {/* Left: brand */}
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div>
          <span className="app-brand">InvoicePro</span>
          <span className="app-brand-sub"> · GST Invoice Manager</span>
        </div>
        {invCount>0&&<span className="mob-only" style={{display:'none',background:'var(--primary)',color:'#fff',borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:700}}>{invCount}</span>}
      </div>

      {/* Desktop nav — hidden on mobile */}
      <div className="header-right">
        <div title="Toggle Theme" style={{cursor:'pointer',display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:'var(--card2)',border:'1px solid var(--border)',borderRadius:20}} onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>
          {theme==='dark'?<Ic n="moon" s={14}/>:<Ic n="sun" s={14}/>}
          <span style={{fontSize:12,color:'var(--text2)'}}>{theme==='dark'?'Dark':'Light'}</span>
        </div>
        <button className="btn btn-outline btn-sm" onClick={()=>setModal('terms')}><Ic n="pdf" s={13}/>Terms</button>
        <button className="btn btn-outline btn-sm" onClick={()=>setModal('history')}>
          <Ic n="history" s={13}/>History
          {invCount>0&&<span style={{background:'var(--primary)',color:'#fff',borderRadius:'50%',width:18,height:18,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700}}>{invCount}</span>}
        </button>
        <button className="btn btn-outline btn-sm" onClick={()=>setModal('expenses')}>🧾 Expenses</button>
        <button className="btn btn-outline btn-sm" onClick={()=>setModal('customers')}>👥 Customers</button>
        <button className="btn btn-outline btn-sm" onClick={pickSaveFolder}>📁 Save Folder</button>
        <button className="btn btn-outline-gold btn-sm" onClick={()=>setModal('hsn')}><Ic n="tag" s={13}/>HSN Database</button>
        <button className="btn btn-outline-primary btn-sm" onClick={()=>setModal('company')}><Ic n="building" s={13}/>Company</button>
        {isAdmin&&<button className="btn btn-gold btn-sm" onClick={()=>setModal('admin')}><Ic n="shield" s={13}/>{isSuperAdmin(user.email)?'👑 Super Admin':'Admin'}</button>}
        <div className="user-pill">
          <div className="user-avatar">{user.name[0]}</div>
          <span>{user.name}</span>
        </div>
        <button className="btn btn-outline btn-icon" onClick={logout} title="Logout"><Ic n="logout" s={14}/></button>
      </div>

      {/* Mobile right: invoice count + hamburger */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:'auto'}}
           className="mob-header-right">
        <div style={{textAlign:'right',lineHeight:1.2}}>
          <div style={{fontSize:11,color:'var(--text3)'}}>Welcome</div>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text)',maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
        </div>
        <button onClick={()=>setMenuOpen(true)}
          style={{background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:10,width:40,height:40,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,cursor:'pointer',flexShrink:0}}>
          <div style={{width:18,height:2,borderRadius:2,background:'var(--text2)'}}/>
          <div style={{width:18,height:2,borderRadius:2,background:'var(--text2)'}}/>
          <div style={{width:12,height:2,borderRadius:2,background:'var(--text2)'}}/>
        </button>
      </div>
    </header>

    <div className="app-body">
      <InvoiceForm key={formKey} currentUser={user} initial={loadedInv} onSave={()=>{}}/>
    </div>

    {modal==='company'&&<CompanyModal onClose={()=>setModal(null)}/>}
    {modal==='hsn'&&<HSNModal onClose={()=>setModal(null)}/>}
    {modal==='terms'&&<TermsModal onClose={()=>setModal(null)}/>}
    {modal==='customers'&&<CustomerModal onClose={()=>setModal(null)}/>}
    {modal==='expenses'&&<ExpenseModal onClose={()=>setModal(null)} currentUser={user}/>}
    {modal==='history'&&<HistoryModal onClose={()=>setModal(null)} onLoad={loadInv} currentUser={user}/>}
    {modal==='admin'&&isAdmin&&<AdminPanel currentUser={user} onClose={()=>setModal(null)}/>}
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
