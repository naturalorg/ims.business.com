const Dashboard = ({onClose, onLoad})=>{
  const invs=S.get(SK.INV,[]);
  const exps=S.get(SK.EXP,[]);
  const co=S.get(SK.CO,{});
  const mn=new Date();

  // Auto-detect overdue on dashboard open
  useEffect(()=>{ checkOverdue(); },[]);

  // Financials
  const totalRev=invs.reduce((s,i)=>s+(parseFloat(i.grand)||0),0);
  const totalExp=exps.reduce((s,e)=>s+(parseFloat(e.total)||0),0);
  const netProfit=totalRev-totalExp;
  const mInvs=invs.filter(i=>{const d=new Date(i.date||'');return d.getMonth()===mn.getMonth()&&d.getFullYear()===mn.getFullYear();});
  const mRev=mInvs.reduce((s,i)=>s+(parseFloat(i.grand)||0),0);
  const overdueInvs=invs.filter(i=>i.status==='Overdue');
  const overdueAmt=overdueInvs.reduce((s,i)=>s+(parseFloat(i.grand)||0),0);
  const unpaidInvs=invs.filter(i=>i.status!=='Paid'&&i.status!=='Draft'&&i.status!=='Cancelled');
  const unpaidAmt=unpaidInvs.reduce((s,i)=>s+(parseFloat(i.grand)||0),0);

  // Monthly revenue for bar chart (last 6 months)
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(mn.getFullYear(),mn.getMonth()-i,1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label=d.toLocaleString('default',{month:'short'});
    const rev=invs.filter(inv=>inv.date?.startsWith(key)).reduce((s,inv)=>s+(parseFloat(inv.grand)||0),0);
    const exp=exps.filter(e=>e.date?.startsWith(key)).reduce((s,e)=>s+(parseFloat(e.total)||0),0);
    months.push({key,label,rev,exp});
  }
  const maxBar=Math.max(...months.map(m=>Math.max(m.rev,m.exp)),1);

  // Status distribution
  const statusCount={Draft:0,Sent:0,Paid:0,Overdue:0,Other:0};
  invs.forEach(i=>{
    if(statusCount[i.status]!==undefined) statusCount[i.status]++;
    else statusCount.Other++;
  });

  // Top 5 customers
  const custMap={};
  invs.filter(i=>i.grand>0).forEach(i=>{
    const n=i.billTo?.name||'Unknown';
    if(!custMap[n])custMap[n]=0;
    custMap[n]+=parseFloat(i.grand)||0;
  });
  const top5=Object.entries(custMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCust=top5[0]?.[1]||1;

  // Recent 5 invoices
  const recent=[...invs].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).slice(0,5);

  const StatCard=({icon,label,value,sub,color,bg})=>(
    <div style={{background:bg||'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:'16px 20px',position:'relative',overflow:'hidden'}}>
      <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
      <div style={{fontFamily:'Sora,sans-serif',fontSize:20,fontWeight:800,color:color||'var(--text)'}}>{value}</div>
      <div style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.5px',marginTop:2}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:color||'var(--text3)',marginTop:4,fontWeight:600}}>{sub}</div>}
    </div>
  );

  return <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal" style={{maxWidth:1100,width:'97vw'}}>
      <div className="modal-hdr">
        <div>
          <span className="modal-title">📊 Dashboard</span>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Welcome back, {S.get(SK.USERS,[])[0]?.name||'Admin'} · {co.name||'Your Company'}</div>
        </div>
        <button className="close-btn" onClick={onClose}><Ic n="x"/></button>
      </div>
      <div className="modal-body">

        {/* ── Overdue Alert ── */}
        {overdueInvs.length>0&&(
          <div className="alert" style={{background:'rgba(255,77,106,0.08)',border:'1px solid rgba(255,77,106,0.25)',color:'var(--red)',marginBottom:16,borderRadius:10}}>
            <span style={{fontSize:18}}>⚠️</span>
            <div>
              <strong>{overdueInvs.length} overdue invoice{overdueInvs.length>1?'s':''}</strong> totalling <strong>{fmt(overdueAmt)}</strong> — immediate attention required.
              <button className="btn btn-sm btn-danger" style={{marginLeft:12}} onClick={()=>{onClose();/* history will show filtered */}}>View</button>
            </div>
          </div>
        )}

        {/* ── KPI Cards ── */}
        <div className="g4" style={{marginBottom:20}}>
          <StatCard icon="💰" label="Net Revenue" value={fmt(totalRev)} sub={`${invs.length} invoices total`} color="var(--green)" bg="linear-gradient(135deg,rgba(15,217,138,0.06),var(--card))"/>
          <StatCard icon="📅" label="This Month" value={fmt(mRev)} sub={`${mInvs.length} invoices`} color="var(--primary2)" bg="linear-gradient(135deg,rgba(99,102,241,0.06),var(--card))"/>
          <StatCard icon="💸" label="Outstanding" value={fmt(unpaidAmt)} sub={`${unpaidInvs.length} unpaid`} color="var(--gold)" bg="linear-gradient(135deg,rgba(245,166,35,0.06),var(--card))"/>
          <StatCard icon={netProfit>=0?"📈":"📉"} label="Net Profit" value={fmt(netProfit)} sub={`Expenses: ${fmt(totalExp)}`} color={netProfit>=0?'var(--green)':'var(--red)'} bg={`linear-gradient(135deg,rgba(${netProfit>=0?'15,217,138':'255,77,106'},0.06),var(--card))`}/>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
          {/* ── Revenue Chart ── */}
          <div className="card">
            <div style={{fontWeight:700,color:'var(--text)',marginBottom:14,fontSize:14}}>📊 Revenue vs Expenses (Last 6 Months)</div>
            <div style={{display:'flex',alignItems:'flex-end',gap:8,height:120}}>
              {months.map((m,i)=>(
                <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <div style={{width:'100%',display:'flex',gap:2,alignItems:'flex-end',height:100}}>
                    <div title={`Revenue: ${fmt(m.rev)}`} style={{flex:1,background:'var(--primary)',borderRadius:'4px 4px 0 0',height:`${Math.max((m.rev/maxBar)*100,2)}%`,opacity:0.85,cursor:'default',transition:'opacity 0.2s'}}
                      onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.85'}/>
                    <div title={`Expenses: ${fmt(m.exp)}`} style={{flex:1,background:'var(--red)',borderRadius:'4px 4px 0 0',height:`${Math.max((m.exp/maxBar)*100,2)}%`,opacity:0.6,cursor:'default',transition:'opacity 0.2s'}}
                      onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.6'}/>
                  </div>
                  <div style={{fontSize:10,color:'var(--text3)',fontWeight:600}}>{m.label}</div>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:16,marginTop:8}}>
              <span style={{fontSize:10,color:'var(--primary)',fontWeight:600}}>■ Revenue</span>
              <span style={{fontSize:10,color:'var(--red)',fontWeight:600}}>■ Expenses</span>
            </div>
          </div>

          {/* ── Invoice Status Donut-style ── */}
          <div className="card">
            <div style={{fontWeight:700,color:'var(--text)',marginBottom:14,fontSize:14}}>🍩 Invoice Status</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[['Paid','var(--green)'],['Sent','var(--primary)'],['Draft','var(--text3)'],['Overdue','var(--red)']].map(([st,col])=>{
                const cnt=statusCount[st]||0;
                const pct=invs.length>0?Math.round(cnt/invs.length*100):0;
                return(
                <div key={st} style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{fontSize:11,color:col,fontWeight:700,width:54}}>{st}</div>
                  <div style={{flex:1,background:'var(--card2)',borderRadius:99,height:10,overflow:'hidden'}}>
                    <div style={{width:`${pct}%`,height:'100%',background:col,borderRadius:99,transition:'width 0.5s ease'}}/>
                  </div>
                  <div style={{fontSize:11,color:'var(--text3)',width:36,textAlign:'right'}}>{cnt} ({pct}%)</div>
                </div>);
              })}
            </div>
            <div style={{marginTop:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div style={{background:'var(--card2)',borderRadius:8,padding:'8px 12px',textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:800,color:'var(--green)'}}>{statusCount.Paid}</div>
                <div style={{fontSize:10,color:'var(--text3)'}}>PAID</div>
              </div>
              <div style={{background:'var(--card2)',borderRadius:8,padding:'8px 12px',textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:800,color:'var(--red)'}}>{statusCount.Overdue}</div>
                <div style={{fontSize:10,color:'var(--text3)'}}>OVERDUE</div>
              </div>
            </div>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {/* ── Top 5 Customers ── */}
          <div className="card">
            <div style={{fontWeight:700,color:'var(--text)',marginBottom:12,fontSize:14}}>🏆 Top 5 Customers by Revenue</div>
            {top5.length>0?(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {top5.map(([name,rev],i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:20,height:20,borderRadius:'50%',background:'var(--accent-grad)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'#fff',flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
                      <div style={{width:`${(rev/maxCust)*100}%`,height:5,background:'var(--primary)',borderRadius:99,marginTop:3,opacity:0.7}}/>
                    </div>
                    <div style={{fontSize:12,fontWeight:700,color:'var(--primary2)',flexShrink:0}}>{fmt(rev)}</div>
                  </div>
                ))}
              </div>
            ):<div style={{textAlign:'center',padding:20,color:'var(--text3)',fontSize:12}}>No invoices yet</div>}
          </div>

          {/* ── Recent Invoices ── */}
          <div className="card">
            <div style={{fontWeight:700,color:'var(--text)',marginBottom:12,fontSize:14}}>🕐 Recent Invoices</div>
            {recent.length>0?(
              <div style={{display:'flex',flexDirection:'column',gap:0}}>
                {recent.map((inv,i)=>{
                  const b=docBadge(inv.docType,inv.isB2C);
                  const stCols={Paid:'var(--green)',Sent:'var(--primary)',Draft:'var(--text3)',Overdue:'var(--red)'};
                  return(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<recent.length-1?'1px solid var(--border)':'none',cursor:'pointer'}}
                    onClick={()=>{onLoad(inv);onClose();}}>
                    <span style={{background:b.bg,color:b.color,borderRadius:5,padding:'2px 6px',fontSize:9,fontWeight:700,flexShrink:0}}>{b.label}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--gold)',fontFamily:'monospace'}}>{inv.invNo}</div>
                      <div style={{fontSize:11,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inv.billTo?.name||'—'}</div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{fmt(Math.abs(inv.grand||0))}</div>
                      <div style={{fontSize:10,color:stCols[inv.status]||'var(--text3)',fontWeight:600}}>{inv.status}</div>
                    </div>
                  </div>);
                })}
              </div>
            ):<div style={{textAlign:'center',padding:20,color:'var(--text3)',fontSize:12}}>No invoices yet</div>}
          </div>
        </div>

      </div>
      <div className="modal-ftr">
        <span style={{fontSize:11,color:'var(--text3)'}}>Last updated: {new Date().toLocaleTimeString()}</span>
        <button className="btn btn-primary" onClick={onClose}>Close</button>
      </div>
    </div>
  </div>;
};

        <button className="btn btn-outline-gold btn-sm" style={{fontSize:11,padding:'5px 10px'}} onClick={()=>setModal('hsn')}>🏷️ HSN</button>
        <button className="btn btn-outline-primary btn-sm" style={{fontSize:11,padding:'5px 10px'}} onClick={()=>setModal('company')}>🏢 Company</button>
        {isAdmin&&<button className="btn btn-gold btn-sm" style={{fontSize:11,padding:'5px 10px'}} onClick={()=>setModal('admin')}>{isSuperAdmin(user.email)?'👑 Super Admin':'🛡️ Admin'}</button>}
        <div className="user-pill" style={{flexShrink:0}}>
          <div className="user-avatar">{user.name[0]}</div>
          <span style={{maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</span>
        </div>
        <button className="btn btn-outline btn-icon" style={{width:30,height:30,padding:0,flexShrink:0}} onClick={logout} title="Logout"><Ic n="logout" s={13}/></button>
      </div>

      {/* Mobile right: invoice count + hamburger */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:'auto'}}
           className="mob-header-right">
        <div style={{textAlign:'right',lineHeight:1.2}}>
          <div style={{fontSize:11,color:'var(--text3)'}}>Welcome</div>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text)',maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
        </div>
        <button onClick={()=>setMenuOpen(true)}
          style={{background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:10,width:40,height:40,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,cursor:'pointer',flexShrink:0}}>
          <div style={{width:18,height:2,borderRadius:2,background:'var(--text2)'}}/>
          <div style={{width:18,height:2,borderRadius:2,background:'var(--text2)'}}/>
          <div style={{width:12,height:2,borderRadius:2,background:'var(--text2)'}}/>
        </button>
      </div>
    </header>

    <div className="app-body">
      <InvoiceForm key={formKey} currentUser={user} initial={loadedInv} onSave={()=>{}}/>
    </div>

    {modal==='po'&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
      <div className="modal" style={{maxWidth:1100,width:'97vw'}}>
        <div className="modal-hdr">
          <span className="modal-title">🛒 New Purchase Order</span>
          <button className="close-btn" onClick={()=>setModal(null)}><Ic n="x"/></button>
        </div>
        <div className="modal-body">
          <POForm key={poKey} currentUser={user} initial={loadedPO} onSave={()=>{setModal(null);setLoadedPO(null);}}/>
        </div>
      </div>
    </div>}

    {modal==='dashboard'&&<Dashboard onClose={()=>setModal(null)} onLoad={loadInv}/>}
    {modal==='products'&&<ProductMasterModal onClose={()=>setModal(null)}/>}
    {modal==='company'&&<CompanyModal onClose={()=>setModal(null)} currentUser={user}/>}
    {modal==='hsn'&&<HSNModal onClose={()=>setModal(null)}/>}
    {modal==='terms'&&<TermsModal onClose={()=>setModal(null)}/>}
    {modal==='customers'&&<CustomerModal onClose={()=>setModal(null)}/>}
    {modal==='expenses'&&<ExpenseModal onClose={()=>setModal(null)} currentUser={user}/>}
    {modal==='history'&&<HistoryModal onClose={()=>setModal(null)} onLoad={loadInv} currentUser={user}/>}
    {modal==='pohistory'&&<POHistoryModal onClose={()=>setModal(null)} onLoad={loadPO} currentUser={user} onNewPO={newPOModal}/>}
    {modal==='admin'&&isAdmin&&<AdminPanel currentUser={user} onClose={()=>setModal(null)}/>}
  </div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
